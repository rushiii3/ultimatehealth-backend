<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete Account</title>
  <style>
    body {
      font-family: "Inter", Arial, sans-serif;
      background: #f4f7fc;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #fff;
      width: 420px;
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
    }

    .alert-box {
      background: #fff3f3;
      border: 1px solid #ffb4b4;
      color: #c70000;
      padding: 15px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 25px;
    }

    .input-group {
      margin-bottom: 18px;
      text-align: left;
    }

    .input-group label {
      font-size: 14px;
      font-weight: 500;
      display: block;
      margin-bottom: 6px;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #d9d9d9;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .input-group input:focus {
      border-color: #4da3ff;
    }

    .delete-btn {
      width: 100%;
      background: #ff3b3b;
      color: white;
      padding: 14px;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.2s ease;
    }

    .delete-btn:hover {
      background: #e60000;
    }

    .cancel-link {
      margin-top: 18px;
      display: block;
      font-size: 14px;
      color: #007bff;
      text-decoration: none;
    }

    .cancel-link:hover {
      text-decoration: underline;
    }

    .icon {
      width: 50px;
      margin-bottom: 20px;
    }

    #responseMsg {
      margin-top: 20px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="container">
    <img src="https://cdn-icons-png.flaticon.com/512/463/463612.png" class="icon">

    <div class="alert-box">
      <strong>Warning:</strong> Deleting your account is permanent and cannot be undone.
    </div>

    <h2 style="margin-bottom: 15px; font-weight: 600;">Confirm Your Identity</h2>
    <p style="font-size: 14px; color: #555; margin-bottom: 25px;">
      Enter your email and password to permanently delete your account.
    </p>

    <form id="deleteForm">
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" required placeholder="Enter your email" />
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" required placeholder="Password" />
      </div>

      <button type="submit" class="delete-btn">Delete My Account</button>
    </form>

    <div id="responseMsg"></div>

    <a href="/" class="cancel-link">Cancel</a>
  </div>


  <script>
    document.getElementById("deleteForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const responseMsg = document.getElementById("responseMsg");

      responseMsg.innerHTML = "Processing...";

      try {
        const res = await fetch("https://uhsocial.in/api/user/delete", {
          method: "DELETE",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + localStorage.getItem("accessToken")
          },
          credentials: "include", 
          body: JSON.stringify({ password })
        });

        const data = await res.json();

        if (res.ok) {
          responseMsg.style.color = "green";
          responseMsg.innerHTML = "Account deleted successfully.";

          // Optional redirect
          setTimeout(() => {
            localStorage.clear();
            window.location.href = "/goodbye.html";
          }, 1500);
        } else {
          responseMsg.style.color = "red";
          responseMsg.innerHTML = data.error || "Something went wrong.";
        }
      } catch (err) {
        responseMsg.style.color = "red";
        responseMsg.innerHTML = "Server error: " + err.message;
      }
    });
  </script>

</body>
</html>
