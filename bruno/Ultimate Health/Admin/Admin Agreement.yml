reateElement(\"div\");\n         roleDiv.style.cssText = \"padding: 10px 12px; border: 1px solid #cbd5e0; border-radius: 8px; font-size: 14px; background: #f7fafc; color: #2d3748; font-weight: 500;\";\n         roleDiv.textContent = designation;\n         designationInput.parentNode.replaceChild(roleDiv, designationInput);\n         }\n         \n         acceptBtn.addEventListener('click', async function () {\n         const fullName = fullNameInput.value.trim();\n         const designation = designationInput.value.trim();\n         \n         if (!isValidFullName(fullName)) {\n         fullNameInput.focus();\n         showMessage('error', '✗ Please enter your full name');\n         return;\n         }\n         \n         if (!designation) {\n         designationInput.focus();\n         showMessage('error', '✗ Please enter your designation');\n         return;\n         }\n         \n         if (!isSignatureValid()) {\n         signatureRequired.style.display = 'block';\n         canvas.scrollIntoView({ behavior: 'smooth', block: 'center' });\n         showMessage('error', '✗ Please provide a valid signature');\n         return;\n         }\n         \n         if (!checkbox.checked) {\n         showMessage('error', '✗ Please accept the agreement terms');\n         return;\n         }\n         \n         messageDiv.style.display = 'block';\n         messageDiv.className = 'info';\n         messageDiv.textContent = 'Generating agreement PDF...';\n         \n         try {\n         \n         const urlParams = new URLSearchParams(window.location.search);\n         const token = urlParams.get(\"token\");\n         \n         if (!token) {\n           throw new Error(\"Unauthorized: Token missing\");\n         }\n         \n         window.history.replaceState({}, document.title, window.location.pathname);\n\n         // Lock all form inputs as static text before generating HTML\n         lockFormInputs(fullName, designation);\n\n         // Lock signature and get the data URL before generating HTML\n         const signatureDataURL = lockSignature();\n\n         // Lock the checkbox in checked state - make it visible and disabled\n         checkbox.checked = true;\n         checkbox.disabled = true;\n\n         // Hide all buttons (accept/decline/clear)\n         acceptBtn.style.display = 'none';\n         declineBtn.style.display = 'none';\n         if (clearBtn) clearBtn.style.display = 'none';\n\n         // Add a timestamp showing when the agreement was signed\n         const timestamp = new Date().toLocaleString('en-IN', {\n           dateStyle: 'long',\n           timeStyle: 'medium',\n           timeZone: 'Asia/Kolkata'\n         });\n\n         const timestampDiv = document.createElement('div');\n         timestampDiv.style.cssText = 'margin-top: 15px; padding: 12px; background: #f0fdf4; border: 1px solid #86efac; border-radius: 8px; font-size: 13px; color: #166534;';\n         timestampDiv.innerHTML = `<strong>✓ Signed on:</strong> ${timestamp}`;\n         messageDiv.parentNode.insertBefore(timestampDiv, messageDiv);\n\n         const agreementHTML = document.documentElement.outerHTML;\n\n\n         const response = await fetch(\"http://localhost:4000/api/admin/upload-agreement\", {\n           method: \"POST\",\n           headers: {\n             \"Content-Type\": \"application/json\",\n             \"Authorization\": `Bearer ${token}`\n           },\n           body: JSON.stringify({\n             html: agreementHTML,\n             fullName: fullName,\n             role: designation,\n             signature: signatureDataURL\n           })\n         });\n         \n         const data = await response.json();\n         \n         if (!response.ok) {\n           throw new Error(data.message || \"Upload failed\");\n         }\n         \n         messageDiv.className = 'success';\n         messageDiv.textContent = '✓ Agreement signed & uploaded successfully! Redirecting to your PDF...';\n\n         setTimeout(() => {\n           if (data.pdfUrl) {\n             window.location.href = data.pdfUrl;\n           } else if (data.key) {\n             window.location.href = `https://uhsocial.in/api/getFile/${data.key}`;\n           } else {\n             window.location.href = \"/admin/dashboard\";\n           }\n         }, 2000);\n         \n         } catch (error) {\n         console.error(error);\n         messageDiv.className = 'error';\n         messageDiv.textContent = '✗ ' + error.message;\n         }\n         });\n         // Helper function to show messages\n         function showMessage(type, text) {\n           messageDiv.style.display = 'block';\n           messageDiv.className = type;\n           messageDiv.textContent = text;\n         \n           // Auto-hide after 5 seconds\n           setTimeout(() => {\n             messageDiv.style.display = 'none';\n           }, 5000);\n         }\n         \n         // Handle Decline button\n         declineBtn.addEventListener('click', function() {\n           if (confirm('Are you sure you want to decline the agreement? You will be logged out and will not have access to admin features.')) {\n             messageDiv.style.display = 'block';\n             messageDiv.className = 'info';\n             messageDiv.textContent = 'Declining agreement and logging out...';\n         \n             // Clear any stored agreement data\n             localStorage.removeItem('adminAgreementAccepted');\n             localStorage.removeItem('accessToken');\n             localStorage.removeItem('refreshToken');\n         \n             // Redirect to logout or home page\n             setTimeout(() => {\n               window.location.href = '/admin/logout';\n             }, 1000);\n           }\n         });\n         \n         // Check if agreement was already accepted\n         window.addEventListener('DOMContentLoaded', function() {\n           const agreementData = localStorage.getItem('adminAgreementAccepted');\n           if (agreementData) {\n             try {\n               const data = JSON.parse(agreementData);\n               if (data.accepted && data.version === '2.0.0') {\n                 // Agreement already accepted for this version\n                 messageDiv.style.display = 'block';\n                 messageDiv.className = 'success';\n         \n                 if (data.signature) {\n                   messageDiv.innerHTML = `✓ You have already accepted and signed this agreement.<br>\n                     <small style=\"font-size: 12px;\">Signed by: ${data.signature.fullName} on ${new Date(data.timestamp).toLocaleString()}</small>`;\n                 } else {\n                   messageDiv.textContent = '✓ You have already accepted this agreement.';\n                 }\n         \n                 // Optionally auto-redirect\n                 setTimeout(() => {\n                   const urlParams = new URLSearchParams(window.location.search);\n                   const redirectUrl = urlParams.get('redirect') || '/admin/dashboard';\n                   window.location.href = redirectUrl;\n                 }, 3000);\n               }\n             } catch (e) {\n               console.error('Error parsing agreement data:', e);\n             }\n           }\n         });\n         \n         // Smooth scroll behavior for content area\n         document.querySelector('.content').style.scrollBehavior = 'smooth';\n      </script>\n   <div style=\"all: initial !important\"></div>\n</body></html>",
