      {
        "html": "<html lang=\"en\"><head>\n      <meta charset=\"UTF-8\">\n      <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n      <title>Admin &amp; Moderator Agreement | UltimateHealth</title>\n      <style>\n         * {\n         margin: 0;\n         padding: 0;\n         box-sizing: border-box;\n         }\n         body {\n         font-family: \"Inter\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", Arial, sans-serif;\n         background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);\n         min-height: 100vh;\n         display: flex;\n         justify-content: center;\n         align-items: center;\n         padding: 20px;\n         color: #333;\n         }\n         .agreement-container {\n         background: #ffffff;\n         width: 100%;\n         max-width: 900px;\n         border-radius: 20px;\n         box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);\n         overflow: hidden;\n         animation: slideIn 0.5s ease-out;\n         }\n         @keyframes slideIn {\n         from {\n         opacity: 0;\n         transform: translateY(-30px);\n         }\n         to {\n         opacity: 1;\n         transform: translateY(0);\n         }\n         }\n         .header {\n         background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);\n         color: white;\n         padding: 40px 30px;\n         text-align: center;\n         position: relative;\n         }\n         .header::after {\n         content: '';\n         position: absolute;\n         bottom: 0;\n         left: 0;\n         right: 0;\n         height: 4px;\n         background: linear-gradient(90deg, #ffd700, #ff6b6b, #4ecdc4);\n         }\n         .logo {\n         width: 60px;\n         height: 60px;\n         margin: 0 auto 15px;\n         background: white;\n         border-radius: 50%;\n         display: flex;\n         align-items: center;\n         justify-content: center;\n         font-size: 30px;\n         box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);\n         }\n         h1 {\n         font-size: 28px;\n         font-weight: 700;\n         margin-bottom: 8px;\n         letter-spacing: -0.5px;\n         }\n         .subtitle {\n         font-size: 15px;\n         opacity: 0.95;\n         font-weight: 400;\n         }\n         .content {\n         padding: 40px;\n         max-height: 500px;\n         overflow-y: auto;\n         background: #fafbfc;\n         }\n         .content::-webkit-scrollbar {\n         width: 8px;\n         }\n         .content::-webkit-scrollbar-track {\n         background: #f1f1f1;\n         }\n         .content::-webkit-scrollbar-thumb {\n         background: #667eea;\n         border-radius: 10px;\n         }\n         h2 {\n         color: #667eea;\n         font-size: 20px;\n         margin-top: 25px;\n         margin-bottom: 12px;\n         font-weight: 600;\n         display: flex;\n         align-items: center;\n         gap: 10px;\n         }\n         h2:first-child {\n         margin-top: 0;\n         }\n         h2::before {\n         content: '■';\n         color: #764ba2;\n         font-size: 12px;\n         }\n         p, li {\n         line-height: 1.7;\n         color: #4a5568;\n         font-size: 15px;\n         margin-bottom: 12px;\n         }\n         ul {\n         margin-left: 20px;\n         margin-bottom: 15px;\n         }\n         li {\n         margin-bottom: 10px;\n         padding-left: 5px;\n         }\n         .highlight {\n         background: #fff3cd;\n         padding: 15px 20px;\n         border-left: 4px solid #ffc107;\n         border-radius: 5px;\n         margin: 20px 0;\n         font-weight: 500;\n         color: #856404;\n         }\n         .role-badge {\n         display: inline-block;\n         padding: 4px 12px;\n         background: linear-gradient(135deg, #667eea, #764ba2);\n         color: white;\n         border-radius: 20px;\n         font-size: 13px;\n         font-weight: 600;\n         margin: 0 5px;\n         }\n         .footer-section {\n         background: white;\n         padding: 30px 40px;\n         border-top: 2px solid #e2e8f0;\n         }\n         .checkbox-container {\n         display: flex;\n         align-items: flex-start;\n         gap: 12px;\n         margin-bottom: 20px;\n         padding: 15px;\n         background: #f8f9fa;\n         border-radius: 10px;\n         cursor: pointer;\n         transition: all 0.2s ease;\n         }\n         .checkbox-container:hover {\n         background: #e9ecef;\n         }\n         .checkbox-container input[type=\"checkbox\"] {\n         width: 20px;\n         height: 20px;\n         cursor: pointer;\n         margin-top: 2px;\n         accent-color: #667eea;\n         }\n         .checkbox-container label {\n         flex: 1;\n         cursor: pointer;\n         font-size: 14px;\n         color: #2d3748;\n         line-height: 1.6;\n         }\n         .button-group {\n         display: flex;\n         gap: 15px;\n         flex-wrap: wrap;\n         }\n         .btn {\n         flex: 1;\n         min-width: 150px;\n         padding: 14px 25px;\n         border: none;\n         border-radius: 25px;\n         font-size: 16px;\n         font-weight: 600;\n         cursor: pointer;\n         transition: all 0.3s ease;\n         text-align: center;\n         }\n         .btn-accept {\n         background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);\n         color: white;\n         box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);\n         }\n         .btn-accept:hover:not(:disabled) {\n         transform: translateY(-2px);\n         box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);\n         }\n         .btn-accept:disabled {\n         background: #cbd5e0;\n         cursor: not-allowed;\n         box-shadow: none;\n         }\n         .btn-decline {\n         background: #f7f7f7;\n         color: #4a5568;\n         border: 2px solid #e2e8f0;\n         }\n         .btn-decline:hover {\n         background: #e2e8f0;\n         border-color: #cbd5e0;\n         }\n         #message {\n         margin-top: 15px;\n         padding: 12px 18px;\n         border-radius: 8px;\n         font-size: 14px;\n         font-weight: 500;\n         text-align: center;\n         display: none;\n         }\n         .success {\n         background: #d4edda;\n         color: #155724;\n         border: 1px solid #c3e6cb;\n         }\n         .error {\n         background: #f8d7da;\n         color: #721c24;\n         border: 1px solid #f5c6cb;\n         }\n         .info {\n         background: #d1ecf1;\n         color: #0c5460;\n         border: 1px solid #bee5eb;\n         }\n         .signature-section {\n         margin: 25px 0;\n         padding: 20px;\n         background: #f8f9fa;\n         border-radius: 10px;\n         border: 2px dashed #cbd5e0;\n         }\n         .signature-section h3 {\n         font-size: 16px;\n         margin-bottom: 15px;\n         color: #2d3748;\n         display: flex;\n         align-items: center;\n         gap: 8px;\n         }\n         .signature-section h3::before {\n         content: '✍️';\n         font-size: 20px;\n         }\n         .signature-input-group {\n         margin-bottom: 15px;\n         }\n         .signature-input-group label {\n         display: block;\n         font-size: 13px;\n         font-weight: 500;\n         color: #4a5568;\n         margin-bottom: 6px;\n         }\n         .signature-input-group input {\n         width: 100%;\n         padding: 10px 12px;\n         border: 1px solid #cbd5e0;\n         border-radius: 8px;\n         font-size: 14px;\n         transition: border-color 0.2s ease;\n         }\n         .signature-input-group input:focus {\n         outline: none;\n         border-color: #667eea;\n         box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);\n         }\n         .signature-canvas-container {\n         margin-top: 10px;\n         }\n         .canvas-label {\n         display: block;\n         font-size: 13px;\n         font-weight: 500;\n         color: #4a5568;\n         margin-bottom: 8px;\n         }\n         #signatureCanvas {\n         width: 100%;\n         height: 150px;\n         border: 2px solid #cbd5e0;\n         border-radius: 8px;\n         background: white;\n         cursor: crosshair;\n         touch-action: none;\n         }\n         #signatureCanvas.signed {\n         border-color: #667eea;\n         }\n         .canvas-controls {\n         display: flex;\n         gap: 10px;\n         margin-top: 10px;\n         flex-wrap: wrap;\n         }\n         .btn-clear {\n         padding: 8px 16px;\n         background: #f7fafc;\n         color: #4a5568;\n         border: 1px solid #cbd5e0;\n         border-radius: 6px;\n         font-size: 13px;\n         font-weight: 500;\n         cursor: pointer;\n         transition: all 0.2s ease;\n         }\n         .btn-clear:hover {\n         background: #edf2f7;\n         border-color: #a0aec0;\n         }\n         .signature-info {\n         font-size: 12px;\n         color: #718096;\n         margin-top: 8px;\n         font-style: italic;\n         }\n         .signature-required {\n         display: none;\n         color: #e53e3e;\n         font-size: 13px;\n         margin-top: 8px;\n         font-weight: 500;\n         }\n         @media (max-width: 768px) {\n         .agreement-container {\n         border-radius: 10px;\n         }\n         .header {\n         padding: 30px 20px;\n         }\n         h1 {\n         font-size: 24px;\n         }\n         .content {\n         padding: 25px 20px;\n         max-height: 400px;\n         }\n         .footer-section {\n         padding: 20px;\n         }\n         .button-group {\n         flex-direction: column;\n         }\n         .btn {\n         width: 100%;\n         }\n         }\n      </style>\n   </head>\n   <body>\n      <div class=\"agreement-container\">\n         <!-- Header -->\n         <div class=\"header\">\n            <div class=\"logo\">⚕️</div>\n            <h1>Admin &amp; Moderator Agreement</h1>\n            <p class=\"subtitle\">UltimateHealth Platform</p>\n         </div>\n         <!-- Content -->\n         <div class=\"content\" style=\"scroll-behavior: smooth;\">\n            <h2>Welcome to the UltimateHealth Review Team</h2>\n            <p>\n               Thank you for joining our mission to provide high-quality, verified health content to our community.\n               As an admin or moderator, you play a critical role in maintaining the integrity and quality of content on our platform.\n            </p>\n            <h2>Role &amp; Responsibilities</h2>\n            <p>You will be assigned one of the following roles:</p>\n            <ul>\n               <li><span class=\"role-badge\">Moderator</span> - Content review and moderation capabilities</li>\n            </ul>\n            <p><strong>Your responsibilities include:</strong></p>\n            <ul>\n               <li>Reviewing submitted articles for accuracy, quality, and compliance with platform guidelines</li>\n               <li>Providing constructive feedback to authors when revisions are needed</li>\n               <li>Publishing articles that meet quality standards</li>\n               <li>Discarding content that violates guidelines with clear explanations</li>\n               <li>Investigating and resolving user reports promptly and fairly</li>\n               <li>Taking appropriate moderation actions on policy violations</li>\n               <li>Responding to review requests and reports in a timely manner</li>\n               <li>Maintaining professionalism in all communications with authors and users</li>\n               <li>Ensuring fair and unbiased decision-making in all moderation activities</li>\n            </ul>\n            <h2>Privileges &amp; Access</h2>\n            <ul>\n               <li>Access to the admin dashboard and review system</li>\n               <li>Ability to self-assign articles for review</li>\n               <li>Authority to publish or discard submitted content</li>\n               <li>Manage and resolve user reports and community violations</li>\n               <li>Take moderation actions (warn, block, ban users; remove/restore content)</li>\n               <li>View analytics and contribution metrics</li>\n               <li>Receive notifications for review requests and updates</li>\n               <li>Single-device authentication for enhanced security</li>\n            </ul>\n            <h2>Code of Conduct</h2>\n            <p><strong>As a member of the review team, you agree to:</strong></p>\n            <ul>\n               <li><strong>Maintain Confidentiality:</strong> Protect user information and unpublished content</li>\n               <li><strong>Act with Integrity:</strong> Make unbiased decisions based on content quality and guidelines</li>\n               <li><strong>Fair Moderation:</strong> Apply moderation actions consistently without bias or favoritism</li>\n               <li><strong>Respect Users:</strong> Provide respectful, constructive feedback to all community members</li>\n               <li><strong>Follow Guidelines:</strong> Adhere to UltimateHealth's content and community standards</li>\n               <li><strong>Thorough Investigation:</strong> Fully investigate reports before taking action</li>\n               <li><strong>Report Issues:</strong> Notify Super Admins of technical issues or policy violations</li>\n               <li><strong>Continuous Learning:</strong> Stay updated on health information best practices and moderation policies</li>\n               <li><strong>Accountability:</strong> Take responsibility for your moderation decisions and be prepared to explain them</li>\n            </ul>\n            <h2>Security &amp; Account Management</h2>\n            <ul>\n               <li>Your account uses JWT-based authentication with automatic session management</li>\n               <li>You can only be logged in on one device at a time for security</li>\n               <li>Email verification is required before accessing admin features</li>\n               <li>Regularly update your password and keep credentials secure</li>\n               <li>Report any suspicious activity immediately</li>\n            </ul>\n            <h2>Content Review Standards</h2>\n            <p><strong>Articles must meet the following criteria to be published:</strong></p>\n            <ul>\n               <li>Medically accurate and evidence-based information</li>\n               <li>Clear, well-structured, and grammatically correct writing</li>\n               <li>Proper citations and credible sources</li>\n               <li>Compliance with copyright and intellectual property laws</li>\n               <li>Appropriate images with proper attribution</li>\n               <li>No promotional or misleading content</li>\n            </ul>\n            <div class=\"highlight\">\n               ⚠️ <strong>Important:</strong> Misuse of admin privileges, bias in content review, or breach of confidentiality\n               may result in immediate revocation of access and termination from the review team.\n            </div>\n            <h2>Review Workflow</h2>\n            <p><strong>Standard article review process:</strong></p>\n            <ul>\n               <li><strong>Assignment:</strong> Self-assign from available articles or receive direct assignments</li>\n               <li><strong>Review:</strong> Thoroughly evaluate content against quality standards</li>\n               <li><strong>Feedback:</strong> Provide detailed feedback if changes are needed (status: AWAITING_USER)</li>\n               <li><strong>Re-review:</strong> Check author revisions when submitted (status: REVIEW_PENDING)</li>\n               <li><strong>Decision:</strong> Publish approved articles or discard with explanation</li>\n               <li><strong>Notification:</strong> Authors receive automated updates at each stage</li>\n            </ul>\n            <h2>Report Resolution &amp; Moderation</h2>\n            <p><strong>As a moderator, you have the authority to handle user reports and maintain community standards:</strong></p>\n            <p><strong>Report Management:</strong></p>\n            <ul>\n               <li>View and pick pending reports for investigation</li>\n               <li>Access detailed report information including reporter, reported user (convict), and content</li>\n               <li>Track assigned reports (in-progress and completed)</li>\n               <li>Manage report reasons (add, update, delete report categories)</li>\n            </ul>\n            <p><strong>Available Moderation Actions:</strong></p>\n            <ul>\n               <li><strong>RESOLVED:</strong> Mark valid report as resolved. Decreases convict's active report count and sends resolution notification</li>\n               <li><strong>DISMISSED:</strong> Dismiss false or invalid reports. Increases reporter's misuse count (automatic block after 3 dismissals)</li>\n               <li><strong>IGNORE:</strong> Silently ignore report when convict/reporter is already banned or blocked</li>\n               <li><strong>WARN_CONVICT:</strong> Issue warning and remove offending content. Three warnings result in automatic ban</li>\n               <li><strong>REMOVE_CONTENT:</strong> Remove reported content (article, podcast, or comment) without issuing a warning</li>\n               <li><strong>BLOCK_CONVICT:</strong> Temporarily block user for a set period (typically 1 month) for policy violations</li>\n               <li><strong>BAN_CONVICT:</strong> Permanently ban user for severe or repeated violations</li>\n               <li><strong>RESTORE_CONTENT:</strong> Restore previously removed content if removal was incorrect or upon valid appeal</li>\n               <li><strong>CONVICT_REQUEST_DISAPPROVED:</strong> Reject user's request to restore their removed content</li>\n            </ul>\n            <p><strong>Report Resolution Guidelines:</strong></p>\n            <ul>\n               <li>Investigate each report thoroughly before taking action</li>\n               <li>Review the reported content in full context</li>\n               <li>Consider the severity and frequency of violations</li>\n               <li>Apply actions consistently based on community guidelines</li>\n               <li>Document decisions clearly for transparency</li>\n               <li>Respond to content restoration requests fairly and promptly</li>\n               <li>Escalate complex cases to Super Admins when necessary</li>\n            </ul>\n            <div class=\"highlight\">\n               ⚠️ <strong>Important:</strong> Moderation actions directly impact user experience and platform integrity.\n               Abuse of moderation powers, biased decisions, or failure to follow guidelines may result in removal from the moderation team.\n            </div>\n            <h2>Data Privacy &amp; Compliance</h2>\n            <ul>\n               <li>User data must be handled in accordance with privacy regulations</li>\n               <li>Personal information should not be shared outside the platform</li>\n               <li>Review decisions must be documented and justified</li>\n               <li>Maintain transparency in all moderation actions</li>\n            </ul>\n            <h2>Term &amp; Termination</h2>\n            <p>\n               This agreement remains in effect as long as you maintain an active admin or moderator account.\n               Either party may terminate this agreement at any time. Upon termination, your access will be\n               immediately revoked, and you must cease all use of admin privileges.\n            </p>\n            <h2>Updates to Agreement</h2>\n            <p>\n               UltimateHealth reserves the right to update this agreement. You will be notified of significant\n               changes, and continued use of admin privileges constitutes acceptance of the updated terms.\n            </p>\n            <p style=\"margin-top: 25px; padding-top: 20px; border-top: 2px solid #e2e8f0; font-size: 13px; color: #718096;\">\n               <strong>Last Updated:</strong> April 2026<br>\n               For questions or concerns, please contact: <a href=\"mailto:ultimate.health25@gmail.com\" style=\"color: #667eea;\">ultimate.health25@gmail.com</a>\n            </p>\n         </div>\n         <!-- Footer with Actions -->\n         <div class=\"footer-section\">\n            <!-- Signature Section -->\n            <div class=\"signature-section\">\n               <h3>Digital Signature</h3>\n               <div class=\"signature-input-group\">\n                  <label for=\"fullName\">Full Name <span style=\"color: #e53e3e;\">*</span></label>\n                  <div style=\"padding: 10px 12px; border: 1px solid rgb(203, 213, 224); border-radius: 8px; font-size: 14px; background: rgb(247, 250, 252); color: rgb(45, 55, 72); font-weight: 500;\">test test</div>\n               </div>\n               <div class=\"signature-input-group\">\n                  <label for=\"designation\">Designation/Role <span style=\"color: #e53e3e;\">*</span></label>\n                  <div style=\"padding: 10px 12px; border: 1px solid rgb(203, 213, 224); border-radius: 8px; font-size: 14px; background: rgb(247, 250, 252); color: rgb(45, 55, 72); font-weight: 500;\">mode</div>\n               </div>\n               <div class=\"signature-canvas-container\">\n                  <label class=\"canvas-label\">\n                  Draw Your Signature <span style=\"color: #e53e3e;\">*</span>\n                  </label>\n                  <img src=\"data:image/png;base64,\" style=\"width: 602px; height: 150px; border: 1px solid rgb(204, 204, 204);\">\n                  <div class=\"canvas-controls\">\n                     <button type=\"button\" class=\"btn-clear\" id=\"clearBtn\" disabled=\"\" style=\"display: none;\">Clear Signature</button>\n                     <span class=\"signature-info\">Draw your signature using mouse or touch</span>\n                  </div>\n                  <div class=\"signature-required\" id=\"signatureRequired\" style=\"display: none;\">\n                     ⚠️ Signature is required to proceed\n                  </div>\n               </div>\n            </div>\n            <div class=\"checkbox-container\" onclick=\"document.getElementById('agreeCheckbox').click();\">\n               <input type=\"checkbox\" id=\"agreeCheckbox\" onclick=\"event.stopPropagation();\" disabled=\"\">\n               <label for=\"agreeCheckbox\">\n               I have read and agree to the terms and conditions outlined in the Admin &amp; Moderator Agreement.\n               I understand my responsibilities and commit to upholding the standards of the UltimateHealth platform.\n               I confirm that the information and signature provided above are accurate and legally binding.\n               </label>\n            </div>\n            <div class=\"button-group\">\n               <button class=\"btn btn-accept\" id=\"acceptBtn\" style=\"display: none;\">\n               Accept &amp; Continue\n               </button>\n               <button class=\"btn btn-decline\" id=\"declineBtn\" style=\"display: none;\">\n               Decline\n               </button>\n            </div>\n            <div style=\"margin-top: 15px; padding: 12px; background: rgb(240, 253, 244); border: 1px solid rgb(134, 239, 172); border-radius: 8px; font-size: 13px; color: rgb(22, 101, 52);\"><strong>✓ Signed on:</strong> 1 June 2026 at 7:16:51 pm</div><div id=\"message\" class=\"info\" style=\"display: block;\">Generating agreement PDF...</div>\n         </div>\n      </div>\n      <script>\n         // Elements\n         const checkbox = document.getElementById('agreeCheckbox');\n         const acceptBtn = document.getElementById('acceptBtn');\n         const declineBtn = document.getElementById('declineBtn');\n         const messageDiv = document.getElementById('message');\n         const fullNameInput = document.getElementById('fullName');\n         const designationInput = document.getElementById('designation');\n         const canvas = document.getElementById('signatureCanvas');\n         const clearBtn = document.getElementById('clearBtn');\n         const signatureRequired = document.getElementById('signatureRequired');\n         const ctx = canvas.getContext('2d');\n         let points = [];\n         \n         // Signature Canvas Setup\n         let isDrawing = false;\n         let hasSignature = false;\n         \n         function isValidFullName(name) {\n          const parts = name.trim().split(\" \").filter(p => p.length > 0);\n         return parts.length >= 2; // at least first + last name\n         }\n         \n         // Set canvas size\n         function resizeCanvas() {\n           const rect = canvas.getBoundingClientRect();\n           canvas.width = rect.width;\n           canvas.height = rect.height;\n         \n           // Configure drawing context\n           ctx.strokeStyle = '#2d3748';\n           ctx.lineWidth = 2;\n           ctx.lineCap = 'round';\n           ctx.lineJoin = 'round';\n         }\n         \n         resizeCanvas();\n         window.addEventListener('resize', resizeCanvas);\n         \n         // Drawing functions\n         function startDrawing(e) {\n           e.preventDefault(); \n           isDrawing = true;\n           const pos = getMousePos(e);\n           ctx.beginPath();\n           ctx.moveTo(pos.x, pos.y);\n         }\n         \n         function draw(e) {\n           if (!isDrawing) return;\n         \n           e.preventDefault(); // Prevent scrolling on touch devices\n         \n           const pos = getMousePos(e);\n           points.push(pos); \n           ctx.lineTo(pos.x, pos.y);\n           ctx.stroke();\n         \n           hasSignature = true;\n           canvas.classList.add('signed');\n           signatureRequired.style.display = 'none';\n           validateForm();\n         }\n         \n         function stopDrawing() {\n           if (isDrawing) {\n             isDrawing = false;\n             ctx.closePath();\n           }\n         }\n         \n         function isSignatureValid() {\n         \n         if (points.length < 20) return false;\n         \n         let minX = Infinity, minY = Infinity, maxX = 0, maxY = 0;\n         \n         points.forEach(p => {\n         \n         minX = Math.min(minX, p.x);\n         minY = Math.min(minY, p.y);\n         maxX = Math.max(maxX, p.x);\n         maxY = Math.max(maxY, p.y);\n         });\n         \n         const width = maxX - minX;\n         const height = maxY - minY;\n         \n         return width > 50 && height > 20;\n         }\n         \n         function getMousePos(e) {\n           const rect = canvas.getBoundingClientRect();\n           const clientX = e.clientX || (e.touches && e.touches[0].clientX);\n           const clientY = e.clientY || (e.touches && e.touches[0].clientY);\n         \n           return {\n             x: clientX - rect.left,\n             y: clientY - rect.top\n           };\n         }\n         \n         // Mouse events\n         canvas.addEventListener('mousedown', startDrawing);\n         canvas.addEventListener('mousemove', draw);\n         canvas.addEventListener('mouseup', stopDrawing);\n         canvas.addEventListener('mouseout', stopDrawing);\n         \n         // Touch events\n         canvas.addEventListener('touchstart', startDrawing);\n         canvas.addEventListener('touchmove', draw);\n         canvas.addEventListener('touchend', stopDrawing);\n         \n         // Clear signature\n         clearBtn.addEventListener('click', function() {\n         ctx.clearRect(0, 0, canvas.width, canvas.height);\n         hasSignature = false;\n         points = []; \n         canvas.classList.remove('signed');\n         validateForm();\n         });\n         